<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Socket Chat</title>
    <style>
      :root {
        --bg: #0b141a;
        --panel: #111b21;
        --panel-soft: #202c33;
        --text: #e9edef;
        --muted: #8696a0;
        --incoming: #202c33;
        --outgoing: #005c4b;
        --accent: #00a884;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2c34 0%, var(--bg) 50%);
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--text);
      }

      .chat-shell {
        width: min(920px, 100vw);
        height: min(760px, 100vh);
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        background: var(--panel-soft);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .topbar .title {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.2px;
      }

      .topbar .status {
        margin: 2px 0 0;
        font-size: 0.78rem;
        color: var(--muted);
      }

      #loadMore {
        border: none;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
        font-size: 0.82rem;
        padding: 8px 12px;
        border-radius: 999px;
        cursor: pointer;
      }

      #loadMore:hover {
        background: rgba(255, 255, 255, 0.18);
      }

      .messages-wrap {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.18)),
          linear-gradient(120deg, #17212b 0%, #111b21 100%);
      }

      #messages {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .message {
        max-width: min(72%, 560px);
        padding: 10px 12px;
        border-radius: 12px;
        line-height: 1.35;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      }

      .message.incoming {
        background: var(--incoming);
        border-top-left-radius: 4px;
        align-self: flex-start;
      }

      .message.outgoing {
        background: var(--outgoing);
        border-top-right-radius: 4px;
        align-self: flex-end;
      }

      .meta {
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.72);
        margin-bottom: 4px;
      }

      .content {
        word-break: break-word;
        font-size: 0.95rem;
      }

      #form {
        display: flex;
        gap: 10px;
        padding: 12px;
        background: var(--panel-soft);
      }

      #input {
        flex: 1;
        border: none;
        background: #2a3942;
        color: var(--text);
        border-radius: 999px;
        padding: 12px 16px;
        font-size: 0.95rem;
      }

      #input::placeholder {
        color: var(--muted);
      }

      #input:focus {
        outline: 2px solid rgba(0, 168, 132, 0.45);
      }

      #form button[type="submit"] {
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: #00271f;
        padding: 10px 18px;
        font-weight: 600;
        cursor: pointer;
      }

      #form button[type="submit"]:hover {
        filter: brightness(1.08);
      }

      @media (max-width: 720px) {
        .chat-shell {
          border-radius: 0;
          height: 100vh;
          width: 100vw;
        }

        .message {
          max-width: 82%;
        }

        #form button[type="submit"] {
          padding: 10px 14px;
        }
      }
    </style>
  </head>

  <body>
    <main class="chat-shell">
      <header class="topbar">
        <div>
          <h1 class="title">Realtime Chat</h1>
          <p class="status">Online with Socket.IO</p>
        </div>
        <button type="button" id="loadMore">Load older</button>
      </header>

      <section class="messages-wrap" id="messagesWrap">
        <ul id="messages"></ul>
      </section>

      <form id="form" action="">
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      let lastMessageId = null;
      let oldestMessageId = null;

      const form = document.getElementById("form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const messagesWrap = document.getElementById("messagesWrap");
      const loadMore = document.getElementById("loadMore");

      function buildMessageItem(msg) {
        const item = document.createElement("li");
        const isMine = msg.socketId === socket.id;
        item.className = `message ${isMine ? "outgoing" : "incoming"}`;

        const shortId = String(msg.socketId || "unknown").slice(0, 8);
        item.innerHTML = `
          <div class="meta">${isMine ? "You" : `User ${shortId}`}</div>
          <div class="content"></div>
        `;
        item.querySelector(".content").textContent = msg.contents;
        return item;
      }

      function scrollToBottom() {
        messagesWrap.scrollTop = messagesWrap.scrollHeight;
      }

      function appendMessage(msg) {
        const item = buildMessageItem(msg);
        messages.appendChild(item);
      }

      function prependMessage(msg) {
        const item = buildMessageItem(msg);
        messages.prepend(item);
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const value = input.value.trim();
        if (value) {
          socket.emit("chat message", value);
          input.value = "";
        }
      });

      socket.on("chat message", (msg) => {
        appendMessage(msg);
        lastMessageId = msg._id;
        if (!oldestMessageId) {
          oldestMessageId = msg._id;
        }
        scrollToBottom();
      });

      socket.on("connect", () => {
        if (!socket.recovered) {
          socket.emit("recover messages", lastMessageId);
        }
      });

      loadMore.addEventListener("click", () => {
        socket.emit("older messages", oldestMessageId);
      });

      socket.on("missed messages", (msgs) => {
        msgs.forEach((msg) => {
          appendMessage(msg);
          lastMessageId = msg._id;
        });

        if (msgs.length > 0) {
          if (!oldestMessageId) {
            oldestMessageId = msgs[0]._id;
          }
          lastMessageId = msgs[msgs.length - 1]._id;
          scrollToBottom();
        }
      });

      socket.on("older messages", (msgs) => {
        for (let i = msgs.length - 1; i >= 0; i -= 1) {
          prependMessage(msgs[i]);
        }

        if (msgs.length > 0) {
          oldestMessageId = msgs[0]._id;
        }
      });
    </script>
  </body>
</html>
